<!DOCTYPE html>
<html>
<head><title>Grid Slicer</title>
<style>
  body{background:#111;color:#fff;font-family:monospace;padding:8px}
  #bar{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  button{padding:6px 12px;cursor:pointer;font-size:13px}
  input{background:#222;color:#0f0;border:1px solid #555;padding:2px 6px}
  #outer{position:relative;display:inline-block}
  #bg{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat}
  #lines{position:absolute;inset:0;z-index:2}
  .hline{position:absolute;left:0;right:0;height:2px;background:lime;cursor:row-resize}
  .vline{position:absolute;top:0;bottom:0;width:2px;background:lime;cursor:col-resize}
  .hline span,.vline span{position:absolute;font-size:9px;background:#000;color:lime;padding:0 3px;white-space:nowrap}
  .hline span{right:2px;top:-14px}
  .vline span{bottom:2px;left:4px}
  #info{color:#0f0;font-size:12px;margin-top:4px}
</style>
</head>
<body>
<div id="bar">
  <b>Img:</b> <input type="file" id="fileInput" accept="image/png" onchange="upload(this)">
  <input id="imgUrl" value="/equipment.png" size="35" onchange="loadImg(this.value)">
  <button onclick="loadImg(document.getElementById('imgUrl').value)">Load</button>
  <span>|</span>
  <button onclick="addH()">+H</button> <button onclick="addV()">+V</button>
  <button onclick="clearAll()">Clear</button>
  <button onclick="copyJSON()" style="background:#0a0;color:#000">📋 Copy JSON → 切片</button>
  <span>|</span>
  <b>下一步:</b> <a href="/cell-preview.html" style="color:#0f0" target="_blank">打开命名工具</a>
  <span id="info"></span>
</div>
<div id="outer">
  <div id="bg"></div>
  <div id="lines"></div>
</div>

<script>
let W=1408,H=768;
const bg=document.getElementById('bg'), lines=document.getElementById('lines');
let h=[0,0], v=[0,0];
let dragEl=null, dragType='', dragIdx=-1;

function upload(f){
  const file=f.files[0]; if(!file)return;
  loadImg(URL.createObjectURL(file));
  document.getElementById('imgUrl').value=file.name;
}

function loadImg(url){
  const img=new Image();
  img.onload=()=>{
    W=img.naturalWidth; H=img.naturalHeight;
    bg.style.width=W+'px'; bg.style.height=H+'px';
    bg.style.backgroundImage='url('+url+')';
    h=[0,H]; v=[0,W];
    renderLines();
  };
  img.src=url;
}

function addH(){h.push(Math.round(H/2));h.sort((a,b)=>a-b);renderLines()}
function addV(){v.push(Math.round(W/2));v.sort((a,b)=>a-b);renderLines()}
function clearAll(){h=[0,H];v=[0,W];renderLines()}

function renderLines(){
  lines.innerHTML='';
  let cells=0;
  for(let ri=0;ri<h.length-1;ri++)
    for(let ci=0;ci<v.length-1;ci++){
      if(v[ci+1]-v[ci]>20&&h[ri+1]-h[ri]>20)cells++;
    }
  document.getElementById('info').textContent=cells+' cells · '+h.length+'H × '+v.length+'V';
  
  h.forEach((y,i)=>{
    const d=document.createElement('div'); d.className='hline'; d.style.top=y+'px';
    d.innerHTML='<span>H'+i+' '+y+'</span>';
    d.onmousedown=e=>startDrag(e,'h',i);
    lines.appendChild(d);
  });
  v.forEach((x,i)=>{
    const d=document.createElement('div'); d.className='vline'; d.style.left=x+'px';
    d.innerHTML='<span>V'+i+' '+x+'</span>';
    d.onmousedown=e=>startDrag(e,'v',i);
    lines.appendChild(d);
  });
}

function startDrag(e, type, idx){
  e.preventDefault();
  dragEl=e.target; dragType=type; dragIdx=idx;
}

document.addEventListener('mousemove',e=>{
  if(!dragEl)return;
  const r=bg.getBoundingClientRect();
  if(dragType==='h'){
    let y=Math.round(e.clientY-r.top);
    y=Math.max(1,Math.min(H-1,y));
    h[dragIdx]=y; h.sort((a,b)=>a-b);
  }else{
    let x=Math.round(e.clientX-r.left);
    x=Math.max(1,Math.min(W-1,x));
    v[dragIdx]=x; v.sort((a,b)=>a-b);
  }
  renderLines();
});
document.addEventListener('mouseup',()=>{dragEl=null});

function copyJSON(){
  const cells=[];
  for(let ri=0;ri<h.length-1;ri++)
    for(let ci=0;ci<v.length-1;ci++){
      const x=v[ci],y=h[ri],w=v[ci+1]-v[ci],hh=h[ri+1]-h[ri];
      if(w>20&&hh>20)cells.push({x,y,w,h:hh});
    }
  navigator.clipboard.writeText(JSON.stringify(cells,null,2));
  document.getElementById('info').textContent=cells.length+' cells copied! Now open naming tool →';
}

loadImg('/equipment.png');
</script>
</body>
</html>
